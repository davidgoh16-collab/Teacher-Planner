<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#5d7752" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
    <title>Teacher Planner</title>
    <script>
      /* Apply the user's cached accent ramp before first paint to avoid a colour flash. */
      try {
        var tpVars = localStorage.getItem('eduPlan_themeVars');
        if (tpVars) {
          var tpScale = JSON.parse(tpVars);
          for (var tpK in tpScale) document.documentElement.style.setProperty('--primary-' + tpK, tpScale[tpK]);
        }
      } catch (e) {}
    </script>
    <script src="/env.js"></script>
</head>
  <body class="bg-[#faf7f2] dark:bg-[#1c1a17] transition-colors duration-200">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
