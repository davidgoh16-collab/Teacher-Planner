<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#16a34a" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
    <title>Teacher Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            // Brand green exposed as a semantic `primary` scale so new components
            // use bg-primary-600 etc. 600 == #16a34a, matching existing green-* usage.
            // Driven by --primary-* CSS variables so the accent can be re-themed at runtime
            // (see utils/themeColor.ts). Defaults below in :root keep the original brand green.
            colors: {
              primary: {
                50: 'rgb(var(--primary-50) / <alpha-value>)',
                100: 'rgb(var(--primary-100) / <alpha-value>)',
                200: 'rgb(var(--primary-200) / <alpha-value>)',
                300: 'rgb(var(--primary-300) / <alpha-value>)',
                400: 'rgb(var(--primary-400) / <alpha-value>)',
                500: 'rgb(var(--primary-500) / <alpha-value>)',
                600: 'rgb(var(--primary-600) / <alpha-value>)',
                700: 'rgb(var(--primary-700) / <alpha-value>)',
                800: 'rgb(var(--primary-800) / <alpha-value>)',
                900: 'rgb(var(--primary-900) / <alpha-value>)',
                950: 'rgb(var(--primary-950) / <alpha-value>)',
              },
            },
            borderRadius: {
              xl: '0.9rem',
              '2xl': '1.1rem',
            },
            boxShadow: {
              soft: '0 1px 2px rgba(16,24,40,.06), 0 1px 3px rgba(16,24,40,.10)',
            },
          }
        }
      }
    </script>
    <script>
      /* Apply the user's cached accent ramp before first paint to avoid a colour flash. */
      try {
        var tpVars = localStorage.getItem('eduPlan_themeVars');
        if (tpVars) {
          var tpScale = JSON.parse(tpVars);
          for (var tpK in tpScale) document.documentElement.style.setProperty('--primary-' + tpK, tpScale[tpK]);
        }
      } catch (e) {}
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      /* Default accent ramp (brand green). Overridden at runtime via utils/themeColor.ts. */
      :root {
        --primary-50: 240 253 244;
        --primary-100: 220 252 231;
        --primary-200: 187 247 208;
        --primary-300: 134 239 172;
        --primary-400: 74 222 128;
        --primary-500: 34 197 94;
        --primary-600: 22 163 74;
        --primary-700: 21 128 61;
        --primary-800: 22 101 52;
        --primary-900: 20 83 45;
        --primary-950: 5 46 22;
      }
      body {
        font-family: 'Inter', sans-serif;
      }
      /* Custom scrollbar for better aesthetics */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: #c1c1c1; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #a8a8a8; 
      }
      
      .dark ::-webkit-scrollbar-thumb {
        background: #475569;
      }
      .dark ::-webkit-scrollbar-thumb:hover {
        background: #64748b;
      }

      /* Hide scrollbar (toolbars, chip rows) */
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      /* Thin styled scrollbar */
      .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
      .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; }

      /* Subtle enter animation for panels & modals using the `animate-in` class */
      @keyframes tp-enter { from { opacity: 0; transform: translateY(4px) scale(0.985); } to { opacity: 1; transform: none; } }
      .animate-in { animation: tp-enter 0.2s ease-out both; }
    </style>
    <script src="/env.js"></script>
</head>
  <body class="bg-gray-50 dark:bg-slate-950 transition-colors duration-200">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
